<h3>Ng-select examples</h3>

<!--Using ng-option and for loop-->
<ng-select [(ngModel)]="selectedCar" style="width: 50%;">
    @for (car of cars; track car.id) {
        <ng-option [value]="car.id">{{car.name}}</ng-option>
    }
</ng-select>

<span> Selected car id: {{selectedCar}}</span>

<!--Using items input-->
<ng-select [items]="cars"
           bindLabel="name"
           bindValue="id"
           [(ngModel)]="selectedCar">
</ng-select>


<mat-sidenav-container class="example-container">
    <mat-sidenav #sidenav [mode]="mode.value || 'over'">
      <p><button matButton (click)="sidenav.toggle()">Toggle</button></p>
      <p>
        <mat-radio-group class="example-radio-group" [formControl]="mode">
          <label>Mode:</label>
          <mat-radio-button value="over">Over</mat-radio-button>
          <mat-radio-button value="side">Side</mat-radio-button>
          <mat-radio-button value="push">Push</mat-radio-button>
        </mat-radio-group>
      </p>
    </mat-sidenav>

    <mat-sidenav-content>
      <p><button matButton (click)="sidenav.toggle()">Toggle</button></p>
      <p>
        <mat-radio-group class="example-radio-group" [formControl]="mode">
          <label>Mode:</label>
          <mat-radio-button value="over">Over</mat-radio-button>
          <mat-radio-button value="side">Side</mat-radio-button>
          <mat-radio-button value="push">Push</mat-radio-button>
        </mat-radio-group>
      </p>
    </mat-sidenav-content>
  </mat-sidenav-container>
